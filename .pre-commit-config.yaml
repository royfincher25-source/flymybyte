# Pre-commit hooks for flymybyte
# Optimized for embedded development (fast hooks only)

repos:
  # Python code formatter (black)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=79]

  # Import sorter (isort)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=79]

  # YAML linter (optional, for config files)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        types: [file, yaml]

# Note: flake8 and mypy excluded - too heavy for embedded development
# Use black + isort for consistent code style
