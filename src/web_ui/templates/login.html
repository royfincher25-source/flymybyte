{% extends "base.html" %}

{% block title %}Вход — FlyMyByte{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="card shadow">
        <div class="card__header bg-primary text-white text-center">
            <h4><i class="fm fm-lock fm-lg"></i> Авторизация</h4>
        </div>
        <div class="card__body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="password" class="label">Пароль</label>
                    <input type="password" class="input" id="password" name="password" required autofocus>
                </div>
                <button type="submit" class="btn btn--primary btn--block">
                    <i class="fm fm-box-arrow-in-right"></i> Войти
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
