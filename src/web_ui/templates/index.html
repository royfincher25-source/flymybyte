{% extends "base.html" %}

{% block title %}Главное меню — FlyMyByte{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="fm fm-menu-app fm-3x"></i> Главное меню</h1>

<div class="row row--menu">
    <!-- Ключи и мосты -->
    <div>
        <a href="{{ url_for('vpn.keys') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card__body text-center">
                    <i class="fm fm-key fm-3x text-primary"></i>
                    <h5 class="card-title mt-3">Ключи и мосты</h5>
                    <p class="card__text text-muted">Настройка VPN ключей</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Списки обхода -->
    <div>
        <a href="{{ url_for('bypass.bypass') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card__body text-center">
                    <i class="fm fm-list-check fm-3x text-success"></i>
                    <h5 class="card-title mt-3">Списки обхода</h5>
                    <p class="card__text text-muted">Управление списками</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Установка и удаление -->
    <div>
        <a href="{{ url_for('updates.service_install') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card__body text-center">
                    <i class="fm fm-download fm-3x text-info"></i>
                    <h5 class="card-title mt-3">Установка</h5>
                    <p class="card__text text-muted">Установка и удаление</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Статистика -->
    <div>
        <a href="{{ url_for('system.stats') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card__body text-center">
                    <i class="fm fm-graph-up fm-3x text-warning"></i>
                    <h5 class="card-title mt-3">Статистика</h5>
                    <p class="card__text text-muted">Статистика трафика</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Сервис -->
    <div>
        <a href="{{ url_for('system.service') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card__body text-center">
                    <i class="fm fm-gear fm-3x text-secondary"></i>
                    <h5 class="card-title mt-3">Сервис</h5>
                    <p class="card__text text-muted">Сервисные функции</p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
