{% extends "base.html" %}

{% block title %}Главное меню — Bypass Keenetic{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="bi bi-menu-app"></i> Главное меню</h1>

<div class="row g-4">
    <!-- Ключи и мосты -->
    <div class="col-12 col-md-6 col-lg-4">
        <a href="{{ url_for('main.keys') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card-body text-center">
                    <i class="bi bi-key display-4 text-primary"></i>
                    <h5 class="card-title mt-3">Ключи и мосты</h5>
                    <p class="card-text text-muted">Настройка VPN ключей</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Списки обхода -->
    <div class="col-12 col-md-6 col-lg-4">
        <a href="{{ url_for('main.bypass') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card-body text-center">
                    <i class="bi bi-list-check display-4 text-success"></i>
                    <h5 class="card-title mt-3">Списки обхода</h5>
                    <p class="card-text text-muted">Управление списками</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Установка и удаление -->
    <div class="col-12 col-md-6 col-lg-4">
        <a href="{{ url_for('main.install') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card-body text-center">
                    <i class="bi bi-download display-4 text-info"></i>
                    <h5 class="card-title mt-3">Установка</h5>
                    <p class="card-text text-muted">Установка и удаление</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Статистика -->
    <div class="col-12 col-md-6 col-lg-4">
        <a href="{{ url_for('main.stats') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card-body text-center">
                    <i class="bi bi-graph-up display-4 text-warning"></i>
                    <h5 class="card-title mt-3">Статистика</h5>
                    <p class="card-text text-muted">Статистика трафика</p>
                </div>
            </div>
        </a>
    </div>

    <!-- Сервис -->
    <div class="col-12 col-md-6 col-lg-4">
        <a href="{{ url_for('main.service') }}" class="text-decoration-none">
            <div class="card h-100 shadow-sm menu-card">
                <div class="card-body text-center">
                    <i class="bi bi-gear display-4 text-secondary"></i>
                    <h5 class="card-title mt-3">Сервис</h5>
                    <p class="card-text text-muted">Сервисные функции</p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
